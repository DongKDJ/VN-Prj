<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <!-- 모바일 세로 화면 최적화: 확대/축소 및 회전 방지 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>슬라임 슬레이어</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a120a;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      /* 모바일 터치 기본 동작 방지 */
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #game-container {
      width: 100%;
      height: 100%;
    }
    canvas {
      display: block;
      /* 모바일 터치 이벤트 최적화 */
      touch-action: none;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <!-- Phaser 3 (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>

  <!-- 설정 -->
  <script src="src/config.js"></script>

  <!-- 엔티티 -->
  <script src="src/entities/XPOrb.js"></script>
  <script src="src/entities/Player.js"></script>
  <script src="src/entities/Monster.js"></script>
  <script src="src/entities/Boss.js"></script>

  <!-- 시스템 -->
  <script src="src/systems/SkillManager.js"></script>
  <script src="src/systems/WaveSystem.js"></script>
  <script src="src/systems/XPSystem.js"></script>

  <!-- 씬 -->
  <script src="src/scenes/BootScene.js"></script>
  <script src="src/scenes/LobbyScene.js"></script>
  <script src="src/scenes/MainScene.js"></script>
  <script src="src/scenes/UIScene.js"></script>
  <script src="src/scenes/LevelUpScene.js"></script>
  <script src="src/scenes/GameOverScene.js"></script>
  <script src="src/scenes/GameClearScene.js"></script>
  <script src="src/scenes/GameScene.js"></script>

  <!-- 메인 -->
  <script src="src/main.js"></script>
</body>
</html>
